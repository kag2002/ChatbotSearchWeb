services:
  backend:
    build:
      context: ./starter_v0
      dockerfile: Dockerfile
    container_name: day4-backend
    ports:
      - "8000:8000"
    env_file:
      - ./starter_v0/.env
    volumes:
      - ./starter_v0/artifacts:/app/artifacts
      - ./starter_v0/runs:/app/runs
      - ./starter_v0/transcripts:/app/transcripts
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: day4-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
